syntax = "proto3";

package shipment.v1;

option go_package = "github.com/nurashi/Shipment-gRPC-microservice/gen/shipment";

import "google/protobuf/timestamp.proto";

enum ShipmentStatus {
  SHIPMENT_STATUS_UNSPECIFIED = 0;
  SHIPMENT_STATUS_PENDING     = 1;
  SHIPMENT_STATUS_PICKED_UP   = 2;
  SHIPMENT_STATUS_IN_TRANSIT  = 3;
  SHIPMENT_STATUS_DELIVERED   = 4;
  SHIPMENT_STATUS_CANCELLED   = 5;
}

message Shipment {
  string                    id               = 1;
  string                    reference_number = 2;
  string                    origin           = 3;
  string                    destination      = 4;
  ShipmentStatus            status           = 5;
  string                    driver_name      = 6;
  string                    unit_number      = 7;
  double                    amount           = 8;
  double                    driver_revenue   = 9;
  google.protobuf.Timestamp created_at       = 10;
  google.protobuf.Timestamp updated_at       = 11;
}

message ShipmentEvent {
  string                    id          = 1;
  string                    shipment_id = 2;
  ShipmentStatus            status      = 3;
  string                    notes       = 4;
  google.protobuf.Timestamp occurred_at = 5;
}

message CreateShipmentRequest {
  string reference_number = 1;
  string origin           = 2;
  string destination      = 3;
  string driver_name      = 4;
  string unit_number      = 5;
  double amount           = 6;
  double driver_revenue   = 7;
}

message GetShipmentRequest {
  string id = 1;
}

message AddShipmentEventRequest {
  string         shipment_id = 1;
  ShipmentStatus status      = 2;
  string         notes       = 3;
}

message GetShipmentHistoryRequest {
  string shipment_id = 1;
}

message ShipmentHistoryResponse {
  repeated ShipmentEvent events = 1;
}

service ShipmentService {
  rpc CreateShipment(CreateShipmentRequest)         returns (Shipment);
  rpc GetShipment(GetShipmentRequest)               returns (Shipment);
  rpc AddShipmentEvent(AddShipmentEventRequest)     returns (ShipmentEvent);
  rpc GetShipmentHistory(GetShipmentHistoryRequest) returns (ShipmentHistoryResponse);
}
